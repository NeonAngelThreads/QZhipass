server.port=7510
app.dev-user-id=${DEV_USER_ID:9001}

# The base application.properties reads MYSQL_URL, MYSQL_USERNAME and MYSQL_PASSWORD.
# This profile creates/seeds only the AI conversation tables from the reviewed MySQL script.
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=file:docs/sql/new_chat_backend.sql

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.application.name=Qintelipass
spring.application.version=1.0.0
server.port=7510

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=1800000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-idle=8

spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/qzhipass?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${MYSQL_DDL_AUTO:validate}
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change-this-local-jwt-secret-at-least-32-bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

ai.api-key=${AI_API_KEY:}
ai.base-url=${AI_API_BASE:https://api.deepseek.com/v1}
ai.chat-model=${AI_CHAT_MODEL:deepseek-chat}
ai.system-prompt=${AI_SYSTEM_PROMPT:You are a helpful enterprise work assistant.}
ai.context.max-tokens=${AI_CONTEXT_MAX_TOKENS:4000}
ai.context.raw-tokens=${AI_CONTEXT_RAW_TOKENS:2000}
ai.context.safety-margin=${AI_CONTEXT_SAFETY_MARGIN:160}
ai.completion.max-tokens=${AI_COMPLETION_MAX_TOKENS:1000}
conversation.checkpoint.interval-ms=${CONVERSATION_CHECKPOINT_INTERVAL_MS:300000}
